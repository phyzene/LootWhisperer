name: Package and Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package and release
        uses: BigWigsMods/packager@v2
        with:
          args: -z -g
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
