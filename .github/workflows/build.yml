name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package addon
        uses: BigWigsMods/packager@v2
        with:
          args: -d -z

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PzLootWhisperer
          path: .release/*.zip
